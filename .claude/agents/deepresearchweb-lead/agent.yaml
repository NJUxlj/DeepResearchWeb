name: deepresearchweb-lead
description: |
  DeepResearchWeb 项目主协调 Agent，负责统筹整个项目的开发工作。
  根据任务类型自动委派给专业 Subagent：架构师、后端开发者、前端开发者、DevOps 工程师。
  适合全栈 Web 应用开发，特别是涉及 FastAPI + React + 多数据库的复杂系统。

model: default

tools:
  - ReadFile
  - WriteFile
  - StrReplaceFile
  - Grep
  - Glob
  - Shell
  - Task

subagents:
  architect:
    file: ../architect/agent.yaml
    description: |
      系统架构师，负责技术选型、系统架构设计、数据库模型设计、API 接口定义。
      适合处理：技术方案制定、架构图设计、接口契约定义、数据流设计。
  
  backend-dev:
    file: ../backend-dev/agent.yaml
    description: |
      后端开发专家，专注于 FastAPI、SQLAlchemy、异步编程、API 实现。
      适合处理：Python 后端代码开发、数据库模型实现、业务逻辑编写、API 端点实现。
  
  frontend-dev:
    file: ../frontend-dev/agent.yaml
    description: |
      前端开发专家，专注于 React + TypeScript + TailwindCSS + shadcn/ui。
      适合处理：UI 组件开发、状态管理、API 集成、响应式设计、引用面板交互。
  
  devops:
    file: ../devops/agent.yaml
    description: |
      DevOps 工程师，专注于 Docker、Docker Compose、CI/CD、环境配置。
      适合处理：容器化配置、服务编排、部署脚本、环境变量管理。
