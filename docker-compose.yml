version: "3.9"

services:
  # ========== 数据存储层 ==========

  mysql:
    image: mysql:8.0
    container_name: drw_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-deepresearch}
      MYSQL_DATABASE: deepresearch
      MYSQL_USER: ${MYSQL_USER:-drw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-drw_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  neo4j:
    image: neo4j:5-community
    container_name: drw_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-deepresearch}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: drw_milvus_etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - drw_network

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: drw_milvus_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - drw_network

  milvus-standalone:
    image: milvusdb/milvus:v2.4.1
    container_name: drw_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_started
      milvus-minio:
        condition: service_started
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: drw_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: drw_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: drw_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  # ========== 应用层 ==========

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drw_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-drw}:${MYSQL_PASSWORD:-drw_pass}@mysql:3306/deepresearch
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-deepresearch}
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DEBUG=${DEBUG:-false}
      - ENV=${ENV:-development}
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      milvus-standalone:
        condition: service_started
      qdrant:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    command: >
      gunicorn app.main:app
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
      --access-logformat '%(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s "%(f)s" "%(a)s" %(D)s'
    volumes:
      - ./logs:/app/logs
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drw_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-drw}:${MYSQL_PASSWORD:-drw_pass}@mysql:3306/deepresearch
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-deepresearch}
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      - DEBUG=${DEBUG:-false}
      - ENV=${ENV:-development}
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus-standalone:
        condition: service_started
      qdrant:
        condition: service_started
    command: arq app.workers.research_worker.WorkerSettings
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drw_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - drw_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

# ========== 卷和网络 ==========

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
  milvus_etcd:
  milvus_minio:
  milvus_data:
  qdrant_data:
  rabbitmq_data:
  redis_data:

networks:
  drw_network:
    driver: bridge
